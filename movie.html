<!DOCTYPE html>
<html>
<head>

<title>Movie Search App</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    margin:40px auto;
}

input{
    padding:12px;
    width:300px;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:red;
    color:white;
    border:0;
    cursor:pointer;
}

.card{
    background:#222;
    width:350px;
    margin:30px auto;
    padding:20px;
    border-radius:10px;
}

.card img{
    width:250px;
    height:350px;
    border-radius:10px;
}

</style>

</head>


<body>


<div class="container">

<h1>🎬 Movie Search App</h1>


<input id="search" placeholder="Enter movie name">


<button onclick="searchMovie()">
Search
</button>


<div id="result"></div>


</div>



<script>


let movies=[

{
title:"Avatar",
year:"2009",
rating:"7.9",
image:"https://upload.wikimedia.org/wikipedia/en/d/d6/Avatar_%282009_film%29_poster.jpg",
description:"Science fiction adventure movie"
},


{
title:"Titanic",
year:"1997",
rating:"7.9",
image:"https://upload.wikimedia.org/wikipedia/en/1/18/Titanic_%281997_film%29_poster.png",
description:"Romantic disaster movie"
},


{
title:"Avengers",
year:"2012",
rating:"8.0",
image:"https://upload.wikimedia.org/wikipedia/en/f/f9/TheAvengers2012Poster.jpg",
description:"Marvel superhero movie"
},


{
title:"Spider-Man",
year:"2002",
rating:"7.4",
image:"https://upload.wikimedia.org/wikipedia/en/f/f3/Spider-Man2002Poster.jpg",
description:"Superhero action movie"
}


];



function searchMovie(){


let input=document.getElementById("search").value.toLowerCase().trim();



let movie=movies.find(function(item){

return item.title.toLowerCase().includes(input);

});



if(movie){


document.getElementById("result").innerHTML=`

<div class="card">

<img src="${movie.image}">

<h2>${movie.title}</h2>

<p>Year: ${movie.year}</p>

<p>⭐ Rating: ${movie.rating}</p>

<p>${movie.description}</p>


</div>

`;


}

else{


document.getElementById("result").innerHTML=
"<h2>Movie Not Found ❌</h2>";

}



}



</script>


</body>
</html>
