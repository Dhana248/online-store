<!DOCTYPE html>
<html>
<head>
<title>FreshCart - Online Grocery Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f4f4;
}


header{
background:#2e7d32;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}


nav a{
color:white;
text-decoration:none;
margin:15px;
}


.banner{

height:300px;
background:url("https://images.unsplash.com/photo-1542838132-92c53300491e")
center/cover;

color:white;
text-align:center;
padding:90px;

}


.banner h1{
font-size:45px;
}



button{

background:#ff9800;
color:white;
border:none;
padding:12px 20px;
margin-top:15px;
cursor:pointer;
border-radius:5px;

}



.products{

display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
padding:30px;

}



.card{

background:white;
width:220px;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;

}



.card img{

width:150px;
height:150px;
object-fit:cover;

}



#details{

display:none;
background:white;
width:350px;
margin:30px auto;
padding:25px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;

}



.order{

background:#2e7d32;

}



footer{

background:#2e7d32;
color:white;
text-align:center;
padding:15px;
margin-top:30px;

}

</style>

</head>


<body>



<header>

<h2>FreshCart 🛒</h2>

<nav>

<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#">Contact</a>

</nav>

</header>




<section class="banner">


<h1>Online Grocery Store</h1>

<p>Fresh Products Delivered To Your Door</p>


<button onclick="showProducts()">
Shop Now
</button>


</section>





<h2 id="products" style="text-align:center;margin:30px;">
Our Products
</h2>





<section class="products">





<div class="card">

<img src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea">

<h3>Vegetables</h3>

<p>₹80/kg</p>


<button onclick="showDetails(
'Vegetables',
'₹80/kg',
'Fresh organic vegetables'
)">
Buy Now
</button>


</div>






<div class="card">

<img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6">

<h3>Fruits</h3>

<p>₹120/kg</p>


<button onclick="showDetails(
'Fruits',
'₹120/kg',
'Fresh seasonal fruits'
)">
Buy Now
</button>


</div>






<div class="card">

<img src="https://images.unsplash.com/photo-1580915411954-282cb1b0d780">

<h3>Milk</h3>

<p>₹60</p>


<button onclick="showDetails(
'Milk',
'₹60',
'Pure fresh milk'
)">
Buy Now
</button>


</div>






<div class="card">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<h3>Groceries</h3>

<p>₹200</p>


<button onclick="showDetails(
'Groceries',
'₹200',
'Daily grocery items'
)">
Buy Now
</button>


</div>



</section>





<div id="details">


<h2>Product Details</h2>


<h3 id="pname"></h3>


<h3 id="pprice"></h3>


<p id="pinfo"></p>



<button class="order">
Place Order
</button>


</div>






<footer>

© 2026 FreshCart Online Grocery Store

</footer>





<script>


function showProducts(){

document.getElementById("products")
.scrollIntoView();

}





function showDetails(name,price,info){


document.getElementById("details")
.style.display="block";


document.getElementById("pname")
.innerHTML=name;


document.getElementById("pprice")
.innerHTML="Price: "+price;


document.getElementById("pinfo")
.innerHTML=info;


document.getElementById("details")
.scrollIntoView();

}


</script>




</body>
</html>
